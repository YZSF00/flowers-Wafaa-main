<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Wafaa🤍</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="icon" href="thumbnail.png" type="image/x-icon">
</head>

<body>
  <div class="scene">
    <p class="title">Wafaa</p>
    <div class="flower">

      <div class="f-wrapper">
        <div class="flower__line"></div>
        <div class="f">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__leaf flower__leaf--5"></div>
          <div class="flower__leaf flower__leaf--6"></div>
          <div class="flower__leaf flower__leaf--7"></div>
          <div class="flower__leaf flower__leaf--8 flower__fall-down--blue"></div>
        </div>
      </div>

      <div class="f-wrapper f-wrapper--2">
        <div class="flower__line"></div>
        <div class="f">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__leaf flower__leaf--5"></div>
          <div class="flower__leaf flower__leaf--6"></div>
          <div class="flower__leaf flower__leaf--7"></div>
          <div class="flower__leaf flower__leaf--8 flower__fall-down--white"></div>
        </div>
      </div>

      <div class="f-wrapper f-wrapper--3">
        <div class="flower__line"></div>
        <div class="f">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__leaf flower__leaf--5"></div>
          <div class="flower__leaf flower__leaf--6"></div>
          <div class="flower__leaf flower__leaf--7"></div>
          <div class="flower__leaf flower__leaf--8 flower__fall-down--purple"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Intro Love Letter -->
  <!-- Intro Love Letter -->
<div class="love-letter">
  <span class="love-spark love-spark--1">♥</span>
  <span class="love-spark love-spark--2">♡</span>
  <span class="love-spark love-spark--3">♥</span>
  <span class="love-spark love-spark--4">♡</span>

  <div class="envelope">
    <div class="envelope__back"></div>

    <!-- Hidden until she slides upward -->
    <div class="love-note">
      <div class="love-note__heart">🤍</div>

      <h2>My beautiful Wafaa,</h2>

      <p>
        You make my world softer, brighter, and more beautiful
        simply by being in it.
      </p>

      <p>I love you more with every passing day.</p>

      <p class="love-note__signature">
        Forever yours 🤍
      </p>
    </div>

    <div class="envelope__front"></div>
    <div class="envelope__flap"></div>

    <!-- Visible while envelope is closed -->
    <div class="swipe-hint">
      <span class="swipe-hint__arrow">↑</span>
      <span class="swipe-hint__text">Slide up to open</span>
    </div>

    <!-- Appears after the message rises -->
    <button id="shakeButton" class="shake-button" type="button">
      <span class="shake-button__icon">📱</span>

      <span class="shake-button__title">
        Tap to activate the surprise
      </span>

      <span class="shake-button__hint">
        Then shake your phone 🌸
      </span>
    </button>
  </div>
</div>

  <div class="message-container">
    <p class="message-title">Wafaa, every petal is for you</p>
    <p class="message-subtext">My heart blooms brighter with you. I love you ❤️</p>
  </div>

  <!-- <button id="shakeButton" class="shake-button" type="button">
  <span class="shake-button__icon">📱</span>
  
  <span class="shake-button__title">Tap to unlock your surprise</span>
  <span class="shake-button__hint">Then shake your phone 🌸</span> -->
</button>

<script src="script.js"></script>
</body>
</html>
